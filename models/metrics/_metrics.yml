# =============================================================================
# Metrics — Retail Sales
#
# Maps to Databricks "composed measures" (MEASURE() references) and
# "window measures" (trailing, cumulative, YTD, day-over-day).
#
# Atomic measures with create_metric: true in the semantic model are
# automatically exposed as simple metrics. This file defines advanced ones.
# =============================================================================
metrics:

  # ========================================================================
  # DERIVED METRICS — Composability (maps to MEASURE() references)
  # ========================================================================

  - name: gross_margin
    description: "Gross margin = total net revenue minus total COGS."
    label: Gross Margin
    type: derived
    type_params:
      expr: total_net_revenue - total_cogs
      metrics:
        - name: total_net_revenue
        - name: total_cogs

  - name: gross_margin_pct
    description: "Gross margin as a percentage of net revenue."
    label: Gross Margin %
    type: derived
    type_params:
      expr: (total_net_revenue - total_cogs) / nullif(total_net_revenue, 0) * 100
      metrics:
        - name: total_net_revenue
        - name: total_cogs

  - name: avg_order_value
    description: "Average revenue per transaction."
    label: Avg Order Value
    type: derived
    type_params:
      expr: total_net_revenue / nullif(transaction_count, 0)
      metrics:
        - name: total_net_revenue
        - name: transaction_count

  - name: avg_selling_price
    description: "Average selling price per unit."
    label: Avg Selling Price
    type: derived
    type_params:
      expr: total_net_revenue / nullif(total_quantity, 0)
      metrics:
        - name: total_net_revenue
        - name: total_quantity

  - name: discount_rate
    description: "Discount as a share of gross revenue."
    label: Discount Rate
    type: derived
    type_params:
      expr: total_discount / nullif(total_gross_revenue, 0)
      metrics:
        - name: total_discount
        - name: total_gross_revenue

  - name: return_rate
    description: "Share of transactions that are returns."
    label: Return Rate
    type: derived
    type_params:
      expr: return_transactions / nullif(transaction_count, 0)
      metrics:
        - name: return_transactions
          filter: |
            {{ Dimension('transaction__return_flag') }} = 'Y'
        - name: transaction_count

  # ========================================================================
  # CUMULATIVE METRICS — Window measures
  # ========================================================================

  - name: trailing_7d_revenue
    description: "Rolling 7-day trailing net revenue."
    label: Trailing 7-Day Revenue
    type: cumulative
    type_params:
      measure: total_net_revenue
      window: 7 days

  - name: trailing_7d_customers
    description: "Distinct customers in trailing 7-day window."
    label: Trailing 7-Day Customers
    type: cumulative
    type_params:
      measure: unique_customers
      window: 7 days

  - name: cumulative_revenue
    description: "Running total of net revenue over all time."
    label: Cumulative Revenue
    type: cumulative
    type_params:
      measure: total_net_revenue

  - name: ytd_revenue
    description: "Year-to-date cumulative net revenue, resets each year."
    label: YTD Revenue
    type: cumulative
    type_params:
      measure: total_net_revenue
      grain_to_date: year

  # ========================================================================
  # DERIVED METRICS — Period-over-period
  # ========================================================================

  - name: day_over_day_growth
    description: "Day-over-day revenue growth percentage."
    label: Day-over-Day Growth %
    type: derived
    type_params:
      expr: (current_rev - previous_rev) / nullif(previous_rev, 0) * 100
      metrics:
        - name: total_net_revenue
          alias: current_rev
        - name: total_net_revenue
          offset_window: 1 day
          alias: previous_rev
