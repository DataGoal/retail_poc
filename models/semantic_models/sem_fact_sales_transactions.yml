# =============================================================================
# Semantic Model — Fact Sales Transactions
#
# Points directly to the source table in Databricks — no staging model needed.
# Derived expressions (transaction_date, revenue_tier) are handled inline
# via dimension expr: fields, same as the Databricks metric view approach.
# =============================================================================
semantic_models:
  - name: fact_sales_transactions
    description: >
      Core retail sales semantic model. Measures defined here are building
      blocks for downstream metrics. Joins to dim_store and dim_product
      happen automatically via shared entity names.
    model: source('ebi_semantic_poc', 'sem_poc_fact_sales_transactions')

    defaults:
      agg_time_dimension: transaction_date

    # ── Entities (join keys) ────────────────────────────────────────────────
    entities:
      - name: transaction
        type: primary
        expr: transaction_sk

      - name: store
        type: foreign
        expr: store_sk

      - name: product
        type: foreign
        expr: product_sk

      - name: customer
        type: foreign
        expr: customer_sk

    # ── Dimensions ──────────────────────────────────────────────────────────
    dimensions:
      # --- Date dimensions (derived inline from surrogate key) ---
      - name: transaction_date
        type: time
        description: Date of the sales transaction.
        expr: "to_date(cast(transaction_date_sk as string), 'yyyyMMdd')"
        type_params:
          time_granularity: day

      - name: transaction_year
        type: time
        description: Year of the transaction (for YTD windows).
        expr: "date_trunc('year', to_date(cast(transaction_date_sk as string), 'yyyyMMdd'))"
        type_params:
          time_granularity: year

      # --- Derived CASE dimension ---
      - name: revenue_tier
        type: categorical
        description: >
          Revenue tier classification per transaction line:
          High-Value (>500), Mid-Value (>100), Low-Value.
        expr: |
          case
            when net_revenue_usd > 500 then 'High-Value'
            when net_revenue_usd > 100 then 'Mid-Value'
            else 'Low-Value'
          end

      - name: return_flag
        type: categorical
        description: Whether the transaction is a return (Y/N).
        expr: return_flag

    # ── Measures (building blocks for metrics) ──────────────────────────────
    measures:
      # --- Revenue measures ---
      - name: total_net_revenue
        description: Total net revenue in USD across all transactions.
        agg: sum
        expr: net_revenue_usd
        create_metric: true

      - name: total_gross_revenue
        description: Total gross revenue before discounts.
        agg: sum
        expr: gross_revenue
        create_metric: true

      - name: total_cogs
        description: Total cost of goods sold.
        agg: sum
        expr: cost_of_goods_sold
        create_metric: true

      - name: total_discount
        description: Total discount amount given.
        agg: sum
        expr: discount_amount
        create_metric: true

      # --- Volume measures ---
      - name: total_quantity
        description: Total units sold.
        agg: sum
        expr: quantity_sold
        create_metric: true

      - name: transaction_count
        description: Distinct number of transactions.
        agg: count_distinct
        expr: transaction_id
        create_metric: true

      - name: unique_customers
        description: Distinct customer count.
        agg: count_distinct
        expr: customer_sk
        create_metric: true

      # --- Conditional measure (return transactions only) ---
      - name: return_transactions
        description: Count of transactions that were returns.
        agg: count_distinct
        expr: transaction_id
        create_metric: true
