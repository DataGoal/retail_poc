# =============================================================================
# Semantic Model — Dim Product
#
# Points directly to the source table. MetricFlow links to the fact semantic
# model via the shared "product" entity name.
# =============================================================================
semantic_models:
  - name: dim_product
    description: >
      Product dimension semantic model. Provides division, category, product,
      and gender target attributes for slicing sales metrics.
    model: source('src_ebi_semantic_poc', 'sem_poc_dim_product')

    entities:
      - name: product
        type: primary
        expr: product_sk

    dimensions:
      - name: division_name
        type: categorical
        description: Business division (e.g., Apparel, Footwear).
        expr: division_name

      - name: category_name
        type: categorical
        description: Product category.
        expr: category_name

      - name: subcategory_name
        type: categorical
        description: Product subcategory.
        expr: subcategory_name

      - name: product_name
        type: categorical
        description: Product name / item.
        expr: product_name

      - name: gender_target
        type: categorical
        description: Target gender for the product.
        expr: gender_target

      - name: sport_occasion
        type: categorical
        description: Sport or occasion the product targets.
        expr: sport_occasion
